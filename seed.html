      const logDiv = document.getElementById("log");

      function log(msg, tipo = "") {
        logDiv.innerHTML += `<div class="${tipo}">${msg}</div>`;
        logDiv.scrollTop = logDiv.scrollHeight;
      }

      async function rodarSeed() {
        const btn = document.getElementById("btn-seed");
        btn.disabled = true;
        btn.textContent = "⏳ Inserindo...";

        log("🔌 Conectando ao Supabase...", "info");

        try {
          const banco = window.supabase.createClient(supabaseUrl, supabaseKey);
          log("✅ Conectado com sucesso!", "ok");

          let sucesso = 0;
          let falha = 0;

          for (let i = 0; i < produtosBrainrot.length; i++) {
            const p = produtosBrainrot[i];
            log(`📦 [${i + 1}/15] Inserindo "${p.nome}"...`, "info");

            const { error } = await banco.from("produtos").insert([p]);

            if (error) {
              log(`   ❌ Erro: ${error.message}`, "erro");
              falha++;
            } else {
              log(`   ✅ Salvo com sucesso!`, "ok");
              sucesso++;
            }

            // Pequeno delay para não sobrecarregar
            await new Promise((r) => setTimeout(r, 200));
          }

          log("", "");
          log(
            `🏁 CONCLUÍDO! ${sucesso} inseridos ✅ | ${falha} erros ❌`,
            "done"
          );
          log("", "");
          log(
            "👉 Agora abra o index.html para ver sua vitrine brainrot!",
            "info"
          );

          btn.textContent = "✅ Concluído!";
        } catch (err) {
          log(`💥 Erro fatal: ${err.message}`, "erro");
          btn.disabled = false;
          btn.textContent = "🔄 Tentar Novamente";
        }
      }
